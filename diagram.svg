<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 2000 2000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#111111"/>
    </marker>
    <style>
      .label { font-family: "Times New Roman", Times, serif; fill: #111111; }
      .title { font-size: 78px; }
      .text { font-size: 54px; }
      .small { font-size: 50px; }
      .axis { stroke: #111111; stroke-width: 4; fill: none; }
      .box { stroke: #111111; stroke-width: 4; }
      .dash { stroke: #444444; stroke-width: 3; stroke-dasharray: 10 10; }
      .arrow { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="2000" height="2000" fill="#f5f2ea"/>

  <line x1="420" y1="230" x2="1460" y2="230" class="axis" marker-end="url(#arrow)"/>
  <text x="1500" y="250" class="label title">z</text>

  <rect x="220" y="420" width="360" height="700" class="box" fill="#dedede"/>
  <rect x="580" y="420" width="980" height="700" class="box" fill="#e7e7fb"/>

  <line x1="580" y1="390" x2="580" y2="1150" class="dash"/>
  <line x1="1560" y1="390" x2="1560" y2="1150" class="dash"/>

  <text x="400" y="705" class="label title" text-anchor="middle">Сталь</text>
  <text x="400" y="800" class="label title" text-anchor="middle">Fe</text>

  <text x="1070" y="610" class="label title" text-anchor="middle">Жидкий свинец</text>
  <text x="1070" y="700" class="label title" text-anchor="middle">диффузионный слой</text>

  <line x1="780" y1="830" x2="610" y2="830" class="arrow"/>
  <text x="1030" y="845" class="label text">J_O(0,t) = 0</text>

  <line x1="780" y1="980" x2="610" y2="980" class="arrow"/>
  <text x="860" y="980" class="label text">J_Fe(0,t) = K_Fe(T) (C_Fe^s(T) - C_Fe(0,t))</text>

  <line x1="1350" y1="830" x2="1530" y2="830" class="arrow"/>
  <text x="820" y="790" class="label text">C_O(l,t) = C_O^bulk = C_O^s(T)</text>

  <line x1="1350" y1="980" x2="1530" y2="980" class="arrow"/>
  <text x="910" y="940" class="label text">C_Fe(l,t) = C_Fe^bulk</text>

  <text x="1070" y="1070" class="label small" text-anchor="middle">при C_O^4 C_Fe^3 &gt; K_Fe3O4(T)</text>
  <text x="1070" y="1135" class="label small" text-anchor="middle">мгновенное осаждение Fe3O4</text>

  <text x="580" y="1290" class="label title" text-anchor="middle">z = 0</text>
  <text x="1560" y="1290" class="label title" text-anchor="middle">z = l</text>
</svg>
